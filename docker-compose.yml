version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: painamnae_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: painamnae_db
      MYSQL_USER: painamnae_user
      MYSQL_PASSWORD: painamnae_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
