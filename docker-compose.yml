version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: painamnae_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: painamnae_user
      POSTGRES_PASSWORD: painamnae_pass
      POSTGRES_DB: painamnae_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
